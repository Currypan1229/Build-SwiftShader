name: build-swiftshader

on:
  schedule:
    - cron: "0 0 * * 0"
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  info:
    runs-on: ubuntu-24.04
    outputs:
      SWIFTSHADER_COMMIT: ${{ steps.info.outputs.SWIFTSHADER_COMMIT }}
      BUILD_DATE: ${{ steps.info.outputs.BUILD_DATE }}

    steps:
      - name: Get Latest Commit Id
        id: info
        run: |
          echo SWIFTSHADER_COMMIT=`git ls-remote https://swiftshader.googlesource.com/SwiftShader HEAD | awk '{ print $1 }'` >> ${GITHUB_OUTPUT}
          echo BUILD_DATE=`date +'%Y-%m-%d'` >> ${GITHUB_OUTPUT}

  build:
    needs: info
    strategy:
      matrix:
        include:
          - os: windows-2022
            arch: x64
          - os: ubuntu-24.04
            arch: x64
          - os: ubuntu-24.04
            arch: arm64
          - os: macos-14
            arch: x64
          - os: macos-14
            arch: arm64

    runs-on: ${{ matrix.os }}
    env:
      SWIFTSHADER_COMMIT: ${{ needs.info.outputs.SWIFTSHADER_COMMIT }}
      BUILD_DATE: ${{ needs.info.outputs.BUILD_DATE }}
      ART_NAME: swiftshader-${{ matrix.os }}-${{ matrix.arch }}

    steps:
      - name: Git clone
        run: |
          git clone --depth 1 --filter=tree:0 https://swiftshader.googlesource.com/SwiftShader.git

      - name: Install tools and build on Windows
        if: ${{ matrix.os == 'windows-2022' }}
        shell: pwsh
        run: |
          choco install -y cmake --installargs "ADD_CMAKE_TO_PATH=System"
          choco install -y ninja zip

      - name: Install tools and build on Ubuntu
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config zip

      - name: Install tools and build on macOS
        if: ${{ matrix.os == 'macos-14' }}
        run: |
          set -e
          brew update || true
          brew install zip || true

      - name: Build on Windows
        if: ${{ matrix.os == 'windows-2022' }}
        shell: pwsh
        run: |
          $CPU_CORES=$env:NUMBER_OF_PROCESSORS
          $THREADS=[int]$CPU_CORES * 4

          cd SwiftShader
          $env:CMAKE_POLICY_DEFAULT_CMP0000 = "NEW"
          $env:CMAKE_POLICY_VERSION_MINIMUM = "3.5"

          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j $THREADS --parallel $THREADS
          cmake --install build --prefix install --config Release

      - name: Build on Linux/macOS
        if: ${{ matrix.os != 'windows-2022' }}
        run: |
          CPU_CORES=$(nproc || sysctl -n hw.ncpu)
          THREADS=$(( CPU_CORES * 4 ))

          cd SwiftShader
          mkdir -p build
          CMAKE_PLATFORM_FLAGS=()
          if [ "${{ matrix.os }}" = "macos-14" ]; then
            if [ "${{ matrix.arch }}" = "arm64" ]; then
              CMAKE_PLATFORM_FLAGS+=("-DCMAKE_OSX_ARCHITECTURES=arm64")
            else
              CMAKE_PLATFORM_FLAGS+=("-DCMAKE_OSX_ARCHITECTURES=x86_64")
            fi
          fi
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release ${CMAKE_PLATFORM_FLAGS[@]} -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build build --config Release -j $THREADS --parallel $THREADS
          cmake --install build --prefix install --config Release

      - name: Package artifact (Windows)
        if: ${{ matrix.os == 'windows-2022' }}
        shell: pwsh
        run: |
          dir install
          Compress-Archive -Path 'install\*' -DestinationPath "$Env:GITHUB_WORKSPACE\${{ env.ART_NAME }}.zip" -Force

      - name: Package artifact (Linux/macOS)
        if: ${{ matrix.os != 'windows-2022' }}
        run: |
          cd SwiftShader
          cd install
          zip -r "${{ github.workspace }}\${{ env.ART_NAME }}.zip" .
          cd ..

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ART_NAME }}
          path: ${{ github.workspace }}\${{ env.ART_NAME }}.zip
          if-no-files-found: error
          compression-level: 0

  release:
    runs-on: ubuntu-24.04
    needs: [info, build]
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Create GitHub Release (notes)
        run: |
          echo "[swiftshader commit](https://swiftshader.googlesource.com/SwiftShader/+/${{ needs.info.outputs.SWIFTSHADER_COMMIT }})" > notes.txt
          gh release create ${{ needs.info.outputs.BUILD_DATE }} -R "${GITHUB_REPOSITORY}" -t "${{ needs.info.outputs.BUILD_DATE }}" -F notes.txt || true

      - name: Get Artifacts From Build Steps
        uses: actions/download-artifact@v4
        with:
          pattern: swiftshader-${{ needs.info.outputs.BUILD_DATE }}-*-*.zip
          merge-multiple: true

      - name: Upload Artifacts to GitHub Release
        run: |
          gh release upload "${{ needs.info.outputs.BUILD_DATE }}" swiftshader-${{ needs.info.outputs.BUILD_DATE }}-*-*.zip -R "${GITHUB_REPOSITORY}" || true
